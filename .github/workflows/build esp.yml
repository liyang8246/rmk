name: Build ESP examples

on:
  push:
    branches: ["main"]
    paths: ["examples/**", "rmk/**", "rmk-macro/**"]
  pull_request:
    branches: ["main"]
    paths: ["examples/**", "rmk/**", "rmk-macro/**"]
  workflow_dispatch:

# Cancel any currently running workflows from the same PR, branch, or
# tag when a new workflow is triggered.
#
# https://stackoverflow.com/a/66336834
concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}

env:
  CARGO_TERM_COLOR: always

jobs:
  determine-runner:
    runs-on: ubuntu-latest
    outputs:
      runner: ${{ steps.set-runner.outputs.use-runner }}
    steps:
      - name: Determine which runner to use
        id: set-runner
        uses: jimmygchen/runner-fallback-action@v1
        with:
          primary-runner: "self-hosted"
          fallback-runner: "ubuntu-22.04"
          github-token: ${{ vars.RMK_GITHUB_TOKEN }}

  build_esp32c3_ble:
    needs: determine-runner
    runs-on: ${{ fromJson(needs.determine-runner.outputs.runner) }}
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: actions/checkout@v3
      - name: Install ldproxy and espup
        run: cargo install ldproxy espup --force
      - name: Install esp toolchain
        run: espup install
      - name: Build esp32c3_ble
        working-directory: ./examples/use_rust/esp32c3_ble
        run: |
          cargo +esp build --release 
          cargo clean
  build_esp32c3_ble_with_config:
    needs: determine-runner
    runs-on: ${{ fromJson(needs.determine-runner.outputs.runner) }}
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: actions/checkout@v3
      - name: Install ldproxy and espup
        run: cargo install ldproxy espup --force
      - name: Install esp toolchain
        run: espup install
      - name: Build esp32c3_ble with config
        working-directory: ./examples/use_config/esp32c3_ble
        run: |
          cargo +esp build --release 
          cargo clean
  build_esp32c6_ble:
    needs: determine-runner
    runs-on: ${{ fromJson(needs.determine-runner.outputs.runner) }}
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: actions/checkout@v3
      - name: Install ldproxy and espup
        run: cargo install ldproxy espup --force
      - name: Install esp toolchain
        run: espup install
      - name: Build esp32c6_ble
        working-directory: ./examples/use_rust/esp32c6_ble
        run: |
          cargo +esp build --release 
          cargo clean
  build_esp32c6_ble_with_config:
    needs: determine-runner
    runs-on: ${{ fromJson(needs.determine-runner.outputs.runner) }}
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: actions/checkout@v3
      - name: Install ldproxy and espup
        run: cargo install ldproxy espup --force
      - name: Install esp toolchain
        run: espup install
      - name: Build esp32c6_ble with config
        working-directory: ./examples/use_config/esp32c6_ble
        run: |
          cargo +esp build --release 
          cargo clean

  build_esp32s3_ble:
    needs: determine-runner
    runs-on: ${{ fromJson(needs.determine-runner.outputs.runner) }}
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: actions/checkout@v3
      - uses: actions/cache@v3
        id: cache-cargo
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ./examples/use_rust/esp32s3_ble/target/
            ./examples/use_rust/esp32s3_ble/.embuild/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Install ldproxy and espup
        run: cargo install ldproxy espup --force
      - name: Install esp toolchain
        run: espup install
      - name: Build esp32s3_ble
        working-directory: ./examples/use_rust/esp32s3_ble
        run: |
          cargo +esp build --release 
          cargo clean
  build_esp32s3_ble_with_config:
    needs: determine-runner
    runs-on: ${{ fromJson(needs.determine-runner.outputs.runner) }}
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: actions/checkout@v3
      - uses: actions/cache@v3
        id: cache-cargo
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ./examples/use_rust/esp32s3_ble/target/
            ./examples/use_rust/esp32s3_ble/.embuild/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Install ldproxy and espup
        run: cargo install ldproxy espup --force     
      - name: Install esp toolchain
        run: espup install
      - name: Build esp32s3_ble with config
        working-directory: ./examples/use_config/esp32s3_ble
        run: |
          cargo +esp build --release 
          cargo clean
